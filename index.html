<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#5C0F0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Carnatic">
  <meta name="description" content="Carnatic Music Practice App — Sarali, Janta, Dhattu, Alankaram">

  <title>Carnatic</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">

  <!-- Google Fonts — Tamil support -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="app">

  <!-- ── HEADER ── -->
  <header id="header">
    <div id="header-back" onclick="handleBack()">‹</div>
    <div id="header-title">Carnatic Music</div>
    <div id="header-right">𝄞</div>
  </header>

  <!-- ── SCREENS ── -->
  <div id="screens">

    <!-- HOME -->
    <div class="screen" id="screen-home"></div>

    <!-- EXERCISES (sub-screen, navigated from home) -->
    <div class="screen" id="screen-exercises"></div>

    <!-- TRACKER -->
    <div class="screen" id="screen-tracker"></div>

    <!-- METRONOME -->
    <div class="screen" id="screen-metronome"></div>

    <!-- QUIZ -->
    <div class="screen" id="screen-quiz"></div>

    <!-- DETAIL OVERLAY (slides over everything) -->
    <div id="detail-screen"></div>

  </div>

  <!-- ── BOTTOM NAV ── -->
  <nav id="bottom-nav">
    <div class="nav-item active" data-tab="home">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Home</div>
    </div>
    <div class="nav-item" data-tab="tracker">
      <div class="nav-icon">📅</div>
      <div class="nav-label">Tracker</div>
    </div>
    <div class="nav-item" data-tab="metronome">
      <div class="nav-icon">🥁</div>
      <div class="nav-label">Metronome</div>
    </div>
    <div class="nav-item" data-tab="quiz">
      <div class="nav-icon">🧠</div>
      <div class="nav-label">Quiz</div>
    </div>
  </nav>

</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<!-- ── SCRIPTS ── -->
<script src="js/data.js"></script>
<script src="js/pitchDetector.js"></script>
<script src="js/app.js"></script>

<!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>

</body>
</html>
